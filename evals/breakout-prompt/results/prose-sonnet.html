<!DOCTYPE html>
<!-- Breakout (Arkanoid-style) · ~390 lines
     Sections: constants, state, audio, drawing, physics, input, resize, game-loop -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  #canvas {
    display: block;
    box-shadow: 0 0 30px rgba(0, 191, 255, 0.25), 0 0 60px rgba(0, 0, 0, 0.8);
  }
</style>
</head>
<body>
<canvas id="canvas" width="480" height="640"></canvas>
<script>
'use strict';

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const CW = 480;
const CH = 640;

const PADDLE_W   = 80;
const PADDLE_H   = 12;
const PADDLE_Y   = CH - 40;
const PADDLE_R   = 6;
const PADDLE_SPD = 8;

const BALL_R  = 7;
const BALL_VX = 3;
const BALL_VY = -4;
const MAX_VX  = 7;

const BRICK_COLS = 8;
const BRICK_ROWS = 5;
const BRICK_W    = 54;
const BRICK_H    = 20;
const BRICK_PAD  = 4;
const BRICK_TOP  = 60;

const GRID_W    = BRICK_COLS * BRICK_W + (BRICK_COLS - 1) * BRICK_PAD;
const BRICK_X0  = (CW - GRID_W) / 2;

const ROW_COLORS = ['#ff4d4d', '#ff944d', '#ffd84d', '#4dd47e', '#4d9dff'];
const ROW_DARK   = ['#cc1111', '#cc5511', '#ccaa00', '#229955', '#1155cc'];
const ROW_SCORES = [50, 40, 30, 20, 10];

const SERVE_DELAY  = 30;
const PULSE_PERIOD = 60;

// ─── STATE ────────────────────────────────────────────────────────────────────
let gameState  = 'menu';  // menu | playing | win | gameover
let score      = 0;
let lives      = 3;
let frame      = 0;
let serving    = false;
let serveTimer = 0;

let paddle = { x: CW / 2 - PADDLE_W / 2 };

let ball   = { x: 0, y: 0, vx: 0, vy: 0 };

let bricks = [];

let keys   = { left: false, right: false };
let mouseX = null;
let touchX = null;

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function _tone(startHz, endHz, duration, type, startTime) {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(startHz, startTime);
  if (endHz !== startHz) {
    osc.frequency.linearRampToValueAtTime(endHz, startTime + duration);
  }
  gain.gain.setValueAtTime(0.3, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playPaddleHit() {
  if (!audioCtx) return;
  _tone(440, 440, 0.05, 'square', audioCtx.currentTime);
}

function playWallHit() {
  if (!audioCtx) return;
  _tone(220, 220, 0.04, 'sine', audioCtx.currentTime);
}

function playBrickHit() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  _tone(660, 660, 0.04, 'sine', t);
  _tone(880, 880, 0.04, 'sine', t + 0.04);
}

function playLifeLost() {
  if (!audioCtx) return;
  _tone(300, 100, 0.2, 'sine', audioCtx.currentTime);
}

function playWin() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784].forEach((hz, i) => _tone(hz, hz, 0.12, 'sine', t + i * 0.12));
}

// ─── DRAWING ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill;     ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawBackground() {
  ctx.fillStyle = '#0d1b2a';
  ctx.fillRect(0, 0, CW, CH);
}

function drawPaddle() {
  roundRect(paddle.x, PADDLE_Y, PADDLE_W, PADDLE_H, PADDLE_R, '#00bfff');
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
}

function drawBricks() {
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = ROW_COLORS[b.row];
    ctx.fillRect(b.x, b.y, BRICK_W, BRICK_H);
    ctx.strokeStyle = ROW_DARK[b.row];
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x + 1, b.y + 1, BRICK_W - 2, BRICK_H - 2);
  }
}

function drawHUD() {
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 12, 28);
  ctx.textAlign = 'right';
  ctx.fillText('LIVES: ' + lives, CW - 12, 28);
}

function drawOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, CW, CH);
}

function pulseAlpha() {
  return 0.7 + 0.3 * Math.sin((frame / PULSE_PERIOD) * Math.PI * 2);
}

function drawMenu() {
  ctx.font = 'bold 40px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText('BREAKOUT', CW / 2, CH * 0.35);

  ctx.globalAlpha = pulseAlpha();
  ctx.font = '20px sans-serif';
  ctx.fillText('Press SPACE or click to start', CW / 2, CH * 0.50);
  ctx.globalAlpha = 1.0;
}

function drawWin() {
  drawOverlay();
  ctx.textAlign = 'center';
  ctx.font = 'bold 40px sans-serif';
  ctx.fillStyle = '#4dd47e';
  ctx.fillText('YOU WIN!', CW / 2, CH * 0.35);

  ctx.font = '28px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Score: ' + score, CW / 2, CH * 0.35 + 50);

  ctx.globalAlpha = pulseAlpha();
  ctx.font = '20px sans-serif';
  ctx.fillText('Press SPACE to play again', CW / 2, CH * 0.60);
  ctx.globalAlpha = 1.0;
}

function drawGameover() {
  drawOverlay();
  ctx.textAlign = 'center';
  ctx.font = 'bold 40px sans-serif';
  ctx.fillStyle = '#ff4d4d';
  ctx.fillText('GAME OVER', CW / 2, CH * 0.35);

  ctx.font = '28px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Score: ' + score, CW / 2, CH * 0.35 + 50);

  ctx.globalAlpha = pulseAlpha();
  ctx.font = '20px sans-serif';
  ctx.fillText('Press SPACE to try again', CW / 2, CH * 0.60);
  ctx.globalAlpha = 1.0;
}

// ─── PHYSICS ──────────────────────────────────────────────────────────────────
function makeBricks() {
  bricks = [];
  for (let row = 0; row < BRICK_ROWS; row++) {
    for (let col = 0; col < BRICK_COLS; col++) {
      bricks.push({
        x:     BRICK_X0 + col * (BRICK_W + BRICK_PAD),
        y:     BRICK_TOP + row * (BRICK_H + BRICK_PAD),
        row,
        alive: true,
      });
    }
  }
}

function serveBall() {
  ball.x  = paddle.x + PADDLE_W / 2;
  ball.y  = PADDLE_Y - BALL_R - 1;
  ball.vx = (Math.random() < 0.5 ? 1 : -1) * BALL_VX;
  ball.vy = BALL_VY;
}

function resetGame() {
  score      = 0;
  lives      = 3;
  frame      = 0;
  serving    = false;
  paddle.x   = CW / 2 - PADDLE_W / 2;
  makeBricks();
  serveBall();
  gameState  = 'playing';
}

function initMenu() {
  score     = 0;
  lives     = 3;
  frame     = 0;
  paddle.x  = CW / 2 - PADDLE_W / 2;
  makeBricks();
  ball.x    = paddle.x + PADDLE_W / 2;
  ball.y    = PADDLE_Y - BALL_R - 1;
  ball.vx   = 0;
  ball.vy   = 0;
  gameState = 'menu';
}

function updatePaddle() {
  if (touchX !== null) {
    paddle.x = touchX - PADDLE_W / 2;
  } else if (mouseX !== null) {
    paddle.x = mouseX - PADDLE_W / 2;
  } else {
    if (keys.left)  paddle.x -= PADDLE_SPD;
    if (keys.right) paddle.x += PADDLE_SPD;
  }
  paddle.x = Math.max(0, Math.min(CW - PADDLE_W, paddle.x));
}

function checkBrickCollision(prevX, prevY) {
  for (const b of bricks) {
    if (!b.alive) continue;

    // Circle–AABB overlap
    const nearX = Math.max(b.x, Math.min(ball.x, b.x + BRICK_W));
    const nearY = Math.max(b.y, Math.min(ball.y, b.y + BRICK_H));
    const dx    = ball.x - nearX;
    const dy    = ball.y - nearY;
    if (dx * dx + dy * dy > BALL_R * BALL_R) continue;

    b.alive = false;
    score  += ROW_SCORES[b.row];
    playBrickHit();

    // Determine entry edge via previous-frame center vs brick edges
    const fromLeft   = prevX < b.x;
    const fromRight  = prevX > b.x + BRICK_W;
    const fromTop    = prevY < b.y;
    const fromBottom = prevY > b.y + BRICK_H;

    const horizEntry = fromLeft || fromRight;
    const vertEntry  = fromTop  || fromBottom;

    if (horizEntry && vertEntry) {
      ball.vx = -ball.vx;
      ball.vy = -ball.vy;
    } else if (vertEntry) {
      ball.vy = -ball.vy;
    } else if (horizEntry) {
      ball.vx = -ball.vx;
    } else {
      // Ball already overlapping — use minimum overlap to decide
      const olLeft   = (ball.x + BALL_R) - b.x;
      const olRight  = (b.x + BRICK_W)  - (ball.x - BALL_R);
      const olTop    = (ball.y + BALL_R) - b.y;
      const olBottom = (b.y + BRICK_H)  - (ball.y - BALL_R);
      if (Math.min(olLeft, olRight) < Math.min(olTop, olBottom)) {
        ball.vx = -ball.vx;
      } else {
        ball.vy = -ball.vy;
      }
    }

    break; // one brick per frame
  }
}

function updateBall() {
  const prevX = ball.x;
  const prevY = ball.y;

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Left / right walls
  if (ball.x - BALL_R < 0) {
    ball.x  = BALL_R;
    ball.vx = Math.abs(ball.vx);
    playWallHit();
  } else if (ball.x + BALL_R > CW) {
    ball.x  = CW - BALL_R;
    ball.vx = -Math.abs(ball.vx);
    playWallHit();
  }

  // Top wall
  if (ball.y - BALL_R < 0) {
    ball.y  = BALL_R;
    ball.vy = Math.abs(ball.vy);
    playWallHit();
  }

  // Paddle collision (ball moving downward, overlaps paddle)
  const padCX = paddle.x + PADDLE_W / 2;
  if (ball.vy > 0 &&
      ball.y + BALL_R >= PADDLE_Y &&
      ball.y - BALL_R <= PADDLE_Y + PADDLE_H &&
      ball.x >= paddle.x &&
      ball.x <= paddle.x + PADDLE_W) {
    ball.vy = -Math.abs(ball.vy);
    ball.vx = ((ball.x - padCX) / (PADDLE_W / 2)) * 5;
    ball.vx = Math.max(-MAX_VX, Math.min(MAX_VX, ball.vx));
    playPaddleHit();
  }

  // Brick collisions
  checkBrickCollision(prevX, prevY);

  // Bottom — lose a life (ball's top edge passes canvas_height)
  if (ball.y - BALL_R > CH) {
    playLifeLost();
    lives--;
    if (lives <= 0) {
      lives     = 0;
      gameState = 'gameover';
    } else {
      serving    = true;
      serveTimer = SERVE_DELAY;
    }
  }
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  if (e.key === ' ') {
    e.preventDefault();
    initAudio();
    if (gameState !== 'playing') resetGame();
  }
});

document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

canvas.addEventListener('mousemove', e => {
  const r  = canvas.getBoundingClientRect();
  mouseX   = (e.clientX - r.left) * (CW / r.width);
});

canvas.addEventListener('mouseleave', () => { mouseX = null; });

canvas.addEventListener('click', () => {
  initAudio();
  if (gameState !== 'playing') resetGame();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const r = canvas.getBoundingClientRect();
  touchX  = (e.touches[0].clientX - r.left) * (CW / r.width);
  if (gameState !== 'playing') resetGame();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  touchX  = (e.touches[0].clientX - r.left) * (CW / r.width);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchX = null;
}, { passive: false });

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function handleResize() {
  const scale = Math.min(window.innerWidth / CW, window.innerHeight / CH);
  canvas.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', handleResize);
handleResize();

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function gameLoop() {
  frame++;

  // ── Update ──
  if (gameState === 'menu') {
    updatePaddle();
    ball.x = paddle.x + PADDLE_W / 2;
    ball.y = PADDLE_Y - BALL_R - 1;

  } else if (gameState === 'playing') {
    updatePaddle();

    if (serving) {
      ball.x = paddle.x + PADDLE_W / 2;
      ball.y = PADDLE_Y - BALL_R - 1;
      serveTimer--;
      if (serveTimer <= 0) {
        serving = false;
        serveBall();
      }
    } else {
      updateBall();
      if (bricks.every(b => !b.alive)) {
        gameState = 'win';
        playWin();
      }
    }
  }

  // ── Draw ──
  drawBackground();
  drawBricks();
  drawPaddle();
  drawBall();
  drawHUD();

  if      (gameState === 'menu')     drawMenu();
  else if (gameState === 'win')      drawWin();
  else if (gameState === 'gameover') drawGameover();

  requestAnimationFrame(gameLoop);
}

// ── Boot ──
initMenu();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
