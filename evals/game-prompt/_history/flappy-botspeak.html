<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        canvas {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            display: block;
            transform-origin: top center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="480" height="640"></canvas>

    <script>
        'use strict';

        // ===== CONSTANTS =====
        const CV = { w: 480, h: 640 };
        const BD = { r: 14, x: CV.w * 0.2 };
        const PHYS = { g: 0.5, flapVy: -9, maxVy: 12, pipeSpd: 3 };
        const PIPE = { w: 60, capW: 70, capH: 20, gap: 150, spawnInt: 90, firstSpawn: 120 };
        const MISC = { gndH: 40, particles: 20, fadeFr: 40, forgive: 4 };
        const ST = { MENU: 'menu', PLAY: 'playing', DIE: 'dying', OVER: 'gameover' };
        const CLR = {
            skyT: '#0f3460', skyB: '#16213e',
            bd: '#FFD700', eye: '#000000', beak: '#FF8C00',
            pipeBody: '#2d6a4f', pipeHi: '#40916c',
            gnd: '#2d5a27', gndSt: '#8fbc45',
            txt: '#FFFFFF'
        };

        // ===== STATE =====
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let state = ST.MENU;
        let fr = 0;
        let sc = 0;
        let best = parseInt(localStorage.getItem('flappyBirdBest')) || 0;
        let ac = null;
        let scale = 1;

        const bird = { x: BD.x, y: CV.h / 2, vy: 0, rot: 0 };
        let pipes = [];
        let nextPipeF = PIPE.firstSpawn;
        let particles = [];

        // ===== AUDIO =====
        function initAC() {
            if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
            return ac;
        }

        function sndFlap() {
            const c = initAC();
            const n = c.currentTime;
            const o = c.createOscillator();
            const g = c.createGain();
            o.frequency.value = 520;
            o.type = 'sine';
            g.gain.setValueAtTime(0.3, n);
            g.gain.exponentialRampToValueAtTime(0.01, n + 0.08);
            o.connect(g);
            g.connect(c.destination);
            o.start(n);
            o.stop(n + 0.08);
        }

        function sndPoint() {
            const c = initAC();
            const n = c.currentTime;
            const o = c.createOscillator();
            const g = c.createGain();
            o.type = 'sine';
            g.gain.setValueAtTime(0.2, n);
            g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
            o.connect(g);
            g.connect(c.destination);
            o.frequency.setValueAtTime(660, n);
            o.frequency.setValueAtTime(880, n + 0.05);
            o.start(n);
            o.stop(n + 0.1);
        }

        function sndHit() {
            const c = initAC();
            const n = c.currentTime;
            const sz = c.sampleRate * 0.15;
            const buf = c.createBuffer(1, sz, c.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < sz; i++) data[i] = Math.random() * 2 - 1;
            const src = c.createBufferSource();
            const g = c.createGain();
            src.buffer = buf;
            g.gain.setValueAtTime(0.3, n);
            g.gain.exponentialRampToValueAtTime(0.01, n + 0.15);
            src.connect(g);
            g.connect(c.destination);
            src.start(n);
        }

        function sndDie() {
            const c = initAC();
            const n = c.currentTime;
            const o = c.createOscillator();
            const g = c.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(400, n + 0.1);
            o.frequency.exponentialRampToValueAtTime(200, n + 0.4);
            g.gain.setValueAtTime(0.2, n + 0.1);
            g.gain.exponentialRampToValueAtTime(0.01, n + 0.4);
            o.connect(g);
            g.connect(c.destination);
            o.start(n + 0.1);
            o.stop(n + 0.4);
        }

        // ===== DRAWING FUNCTIONS =====
        function drawBg() {
            const grad = ctx.createLinearGradient(0, 0, 0, CV.h);
            grad.addColorStop(0, CLR.skyT);
            grad.addColorStop(1, CLR.skyB);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CV.w, CV.h);
        }

        function drawClouds(off) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            const cSpd = PHYS.pipeSpd / 4;
            const cx = (off * cSpd) % CV.w;
            for (let i = 0; i < 6; i++) {
                const x = (cx + i * 100) % (CV.w + 100) - 50;
                const y = 80 + (i % 3) * 40;
                ctx.beginPath();
                ctx.ellipse(x, y, 30, 20, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawGnd(off) {
            const gy = CV.h - MISC.gndH;
            ctx.fillStyle = CLR.gnd;
            ctx.fillRect(0, gy, CV.w, MISC.gndH);
            ctx.fillStyle = CLR.gndSt;
            ctx.fillRect(0, gy, CV.w, 2);
        }

        function drawBd(b) {
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.rotate((b.rot * Math.PI) / 180);
            
            // Body
            ctx.fillStyle = CLR.bd;
            ctx.beginPath();
            ctx.arc(0, 0, BD.r, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye
            ctx.fillStyle = CLR.eye;
            ctx.beginPath();
            ctx.arc(6, -4, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Beak
            ctx.fillStyle = CLR.beak;
            ctx.beginPath();
            ctx.moveTo(10, 0);
            ctx.lineTo(18, -4);
            ctx.lineTo(18, 4);
            ctx.fill();
            
            // Wing animation
            const wa = Math.sin((fr / 8) * Math.PI * 2) * 4;
            ctx.fillStyle = '#DAA520';
            ctx.beginPath();
            ctx.ellipse(-8, wa, 6, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawPipes(pa, off) {
            pa.forEach(p => {
                const px = p.x - off * PHYS.pipeSpd;
                drawPipeBody(px, 0, PIPE.w, p.y);
                drawPipeCap(px, p.y - PIPE.capH);
                const bpy = p.y + PIPE.gap;
                drawPipeBody(px, bpy, PIPE.w, CV.h - bpy);
                drawPipeCap(px, bpy);
            });
        }

        function drawPipeBody(x, y, w, h) {
            ctx.fillStyle = CLR.pipeBody;
            ctx.fillRect(x, y, w, h);
            ctx.fillStyle = CLR.pipeHi;
            ctx.fillRect(x, y, 8, h);
        }

        function drawPipeCap(x, y) {
            ctx.fillStyle = CLR.pipeBody;
            ctx.fillRect(x - 5, y, PIPE.capW, PIPE.capH);
            ctx.fillStyle = CLR.pipeHi;
            ctx.fillRect(x - 5, y, 8, PIPE.capH);
        }

        function drawSc(s) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(100, 20, 280, 60);
            ctx.fillStyle = CLR.txt;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(s, CV.w / 2, 65);
            ctx.font = '20px Arial';
            ctx.textAlign = 'right';
            ctx.fillText('Best: ' + best, CV.w - 10, 25);
        }

        function drawPart() {
            particles.forEach(p => {
                const a = 1 - p.l / MISC.fadeFr;
                ctx.fillStyle = p.c.replace(')', `, ${a})`);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // ===== PHYSICS FUNCTIONS =====
        function updatePhys() {
            if (state === ST.PLAY) {
                bird.vy += PHYS.g;
                if (bird.vy > PHYS.maxVy) bird.vy = PHYS.maxVy;
                bird.y += bird.vy;
                bird.rot = Math.max(-30, Math.min(90, (bird.vy / PHYS.maxVy) * 90));
            }
            particles = particles.filter(p => {
                p.l--;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += PHYS.g;
                return p.l > 0;
            });
        }

        function spawnPipes() {
            if (state === ST.PLAY && fr === nextPipeF) {
                const gapMin = CV.h * 0.2;
                const gapMax = CV.h * 0.75;
                const gy = gapMin + Math.random() * (gapMax - gapMin);
                pipes.push({ x: CV.w, y: gy });
                nextPipeF += PIPE.spawnInt;
            }
        }

        function cleanPipes() {
            pipes = pipes.filter(p => p.x + PIPE.w > 0);
        }

        function checkColl() {
            if (state !== ST.PLAY) return false;
            if (bird.y + BD.r >= CV.h - MISC.gndH - MISC.forgive) return true;
            if (bird.y - BD.r <= MISC.forgive) return true;
            
            for (let p of pipes) {
                const px = p.x;
                const prx = px + PIPE.w;
                if (bird.x + BD.r >= px + MISC.forgive && bird.x - BD.r <= prx - MISC.forgive) {
                    const tpby = p.y - MISC.forgive;
                    const bpty = p.y + PIPE.gap + MISC.forgive;
                    if (bird.y - BD.r < tpby || bird.y + BD.r > bpty) return true;
                }
            }
            return false;
        }

        function checkSc() {
            pipes.forEach(p => {
                if (!p.scored && bird.x > p.x + PIPE.w) {
                    sc++;
                    p.scored = true;
                    sndPoint();
                }
            });
        }

        // ===== INPUT HANDLING =====
        function flap() {
            if (state === ST.MENU || state === ST.OVER) {
                reset();
                state = ST.PLAY;
            } else if (state === ST.PLAY) {
                bird.vy = PHYS.flapVy;
                sndFlap();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });

        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            flap();
        });

        window.addEventListener('resize', updateSc);

        function updateSc() {
            const mw = window.innerWidth - 20;
            const mh = window.innerHeight - 20;
            const sx = mw / CV.w;
            const sy = mh / CV.h;
            scale = Math.min(sx, sy, 1);
            canvas.style.transform = `scale(${scale})`;
        }

        // ===== GAME LOGIC =====
        function reset() {
            bird.y = CV.h / 2;
            bird.vy = 0;
            bird.rot = 0;
            pipes = [];
            particles = [];
            sc = 0;
            nextPipeF = PIPE.firstSpawn;
            fr = 0;
        }

        function emitPart() {
            const cols = ['rgba(255, 200, 0, 1)', 'rgba(255, 140, 0, 1)', 'rgba(255, 100, 0, 1)'];
            for (let i = 0; i < MISC.particles; i++) {
                const ang = Math.random() * Math.PI * 2;
                const spd = 2 + Math.random() * 4;
                particles.push({
                    x: bird.x, y: bird.y,
                    vx: Math.cos(ang) * spd,
                    vy: Math.sin(ang) * spd,
                    r: 3 + Math.random() * 3,
                    c: cols[Math.floor(Math.random() * cols.length)],
                    l: MISC.fadeFr
                });
            }
        }

        function drawMenu() {
            ctx.fillStyle = CLR.txt;
            ctx.font = 'bold 64px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('FLAPPY BIRD', CV.w / 2, CV.h * 0.4);
            
            const op = 0.4 + 0.6 * Math.sin(fr * 0.1);
            ctx.globalAlpha = op;
            ctx.font = '24px Arial';
            ctx.fillText('Press SPACE or tap to start', CV.w / 2, CV.h * 0.55);
            ctx.globalAlpha = 1;
        }

        function drawOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, CV.w, CV.h);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(80, 200, 320, 240);
            
            ctx.fillStyle = CLR.txt;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', CV.w / 2, 250);
            
            ctx.font = '32px Arial';
            ctx.fillText('Score: ' + sc, CV.w / 2, 320);
            ctx.fillText('Best: ' + best, CV.w / 2, 370);
            
            if (sc > best) {
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 24px Arial';
                ctx.fillText('NEW BEST!', CV.w / 2, 420);
            }
            
            ctx.fillStyle = CLR.txt;
            ctx.font = '20px Arial';
            ctx.fillText('Press SPACE or tap to restart', CV.w / 2, 470);
        }

        // ===== GAME LOOP =====
        function loop() {
            drawBg();
            drawClouds(fr);
            drawGnd(fr);
            
            if (state === ST.MENU) {
                bird.y = CV.h / 2 + Math.sin(fr * 0.1) * 8;
                drawBd(bird);
                drawMenu();
            } else if (state === ST.PLAY || state === ST.DIE) {
                updatePhys();
                spawnPipes();
                cleanPipes();
                drawPipes(pipes, fr);
                drawBd(bird);
                drawSc(sc);
                drawPart();
                
                checkSc();
                
                if (checkColl()) {
                    sndHit();
                    emitPart();
                    state = ST.DIE;
                }
                
                if (state === ST.DIE && particles.length === 0) {
                    state = ST.OVER;
                    if (sc > best) {
                        best = sc;
                        localStorage.setItem('flappyBirdBest', best);
                    }
                    sndDie();
                }
            } else if (state === ST.OVER) {
                drawPipes(pipes, fr);
                drawBd(bird);
                drawOver();
            }
            
            fr++;
            requestAnimationFrame(loop);
        }

        updateSc();
        loop();
    </script>
</body>
</html>
