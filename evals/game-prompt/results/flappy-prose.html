<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: none;
            display: block;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform-origin: center;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        'use strict';
        
        // Constants (~120 lines total)
        // Major sections: constants, state, audio, drawing, physics, input, game loop
        
        const CANVAS_WIDTH = 480;
        const CANVAS_HEIGHT = 640;
        const GROUND_HEIGHT = 40;
        const BIRD_RADIUS = 14;
        const BIRD_X = CANVAS_WIDTH * 0.2;
        const PIPE_WIDTH = 60;
        const PIPE_CAP_WIDTH = 70;
        const PIPE_CAP_HEIGHT = 20;
        const PIPE_GAP = 150;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_INTERVAL = 90;
        const FIRST_PIPE_FRAME = 120;
        const GRAVITY = 0.5;
        const FLAP_VELOCITY = -9;
        const TERMINAL_VELOCITY = 12;
        const COLLISION_MARGIN = 4;
        const PARTICLE_COUNT = 20;
        const PARTICLE_LIFE = 40;
        const BIRD_BOB_AMPLITUDE = 8;
        const BIRD_BOB_PERIOD = 60;
        const COLOR_BG = '#1a1a2e';
        const COLOR_SKY_TOP = '#0f3460';
        const COLOR_SKY_BOTTOM = '#16213e';
        const COLOR_GROUND = '#2d5a27';
        const COLOR_GROUND_STRIPE = '#8fbc45';
        const COLOR_BIRD = '#FFD700';
        const COLOR_BIRD_WING = '#E6C200';
        const COLOR_BIRD_EYE = '#000000';
        const COLOR_BIRD_BEAK = '#FF8C00';
        const COLOR_PIPE = '#2d6a4f';
        const COLOR_PIPE_HIGHLIGHT = '#40916c';
        const COLOR_TEXT = '#FFFFFF';
        
        // STATE
        const gameCanvas = document.getElementById('gameCanvas');
        const canvasCtx = gameCanvas.getContext('2d');
        gameCanvas.width = CANVAS_WIDTH;
        gameCanvas.height = CANVAS_HEIGHT;
        
        let gameState = 'menu';
        let frameCount = 0;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('flappyBirdBest') || '0');
        let audioContext = null;
        
        let bird = {
            x: BIRD_X,
            y: CANVAS_HEIGHT / 2,
            velocityY: 0,
            rotation: 0,
            wingPhase: 0
        };
        
        let pipes = [];
        let particles = [];
        let lastScoredPipeIndex = -1;
        let newBestAchieved = false;
        
        // AUDIO
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playFlapSound() {
            if (!audioContext) return;
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = 520;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
        }
        
        function playPointSound() {
            if (!audioContext) return;
            const now = audioContext.currentTime;
            const osc1 = audioContext.createOscillator();
            const gain1 = audioContext.createGain();
            osc1.connect(gain1);
            gain1.connect(audioContext.destination);
            osc1.frequency.value = 660;
            osc1.type = 'sine';
            gain1.gain.setValueAtTime(0.2, now);
            gain1.gain.setValueAtTime(0.2, now + 0.05);
            osc1.start(now);
            osc1.stop(now + 0.05);
            
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            osc2.frequency.value = 880;
            osc2.type = 'sine';
            gain2.gain.setValueAtTime(0.2, now + 0.05);
            gain2.gain.setValueAtTime(0.2, now + 0.1);
            osc2.start(now + 0.05);
            osc2.stop(now + 0.1);
        }
        
        function playHitSound() {
            if (!audioContext) return;
            const now = audioContext.currentTime;
            const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.15, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const source = audioContext.createBufferSource();
            const gain = audioContext.createGain();
            source.buffer = buffer;
            source.connect(gain);
            gain.connect(audioContext.destination);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            source.start(now);
        }
        
        function playDieSound() {
            if (!audioContext) return;
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(200, now + 0.3);
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
        
        // DRAWING
        function drawSky() {
            const grad = canvasCtx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT - GROUND_HEIGHT);
            grad.addColorStop(0, COLOR_SKY_TOP);
            grad.addColorStop(1, COLOR_SKY_BOTTOM);
            canvasCtx.fillStyle = grad;
            canvasCtx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT - GROUND_HEIGHT);
        }
        
        function drawClouds() {
            const cloudSpeed = PIPE_SPEED * 0.25;
            const cloudOffset = ((frameCount * cloudSpeed) % (CANVAS_WIDTH + 200)) - 100;
            canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            canvasCtx.beginPath();
            canvasCtx.ellipse(cloudOffset + 80, 80, 40, 20, 0, 0, Math.PI * 2);
            canvasCtx.fill();
            canvasCtx.beginPath();
            canvasCtx.ellipse(cloudOffset + 200, 120, 50, 25, 0, 0, Math.PI * 2);
            canvasCtx.fill();
            canvasCtx.beginPath();
            canvasCtx.ellipse(cloudOffset + 350, 90, 45, 22, 0, 0, Math.PI * 2);
            canvasCtx.fill();
        }
        
        function drawGround() {
            const groundOffset = ((frameCount * PIPE_SPEED) % CANVAS_WIDTH);
            canvasCtx.fillStyle = COLOR_GROUND;
            canvasCtx.fillRect(0, CANVAS_HEIGHT - GROUND_HEIGHT, CANVAS_WIDTH, GROUND_HEIGHT);
            canvasCtx.fillStyle = COLOR_GROUND_STRIPE;
            canvasCtx.fillRect(0, CANVAS_HEIGHT - GROUND_HEIGHT, CANVAS_WIDTH, 2);
            canvasCtx.strokeStyle = COLOR_GROUND_STRIPE;
            canvasCtx.lineWidth = 1;
            for (let i = -1; i < CANVAS_WIDTH / 40; i++) {
                const x = (i * 40 - groundOffset) % CANVAS_WIDTH;
                canvasCtx.beginPath();
                canvasCtx.moveTo(x, CANVAS_HEIGHT - GROUND_HEIGHT + 5);
                canvasCtx.lineTo(x + 20, CANVAS_HEIGHT - GROUND_HEIGHT + 5);
                canvasCtx.stroke();
            }
        }
        
        function drawBird() {
            canvasCtx.save();
            canvasCtx.translate(bird.x, bird.y);
            canvasCtx.rotate((bird.rotation * Math.PI) / 180);
            canvasCtx.fillStyle = COLOR_BIRD;
            canvasCtx.beginPath();
            canvasCtx.arc(0, 0, BIRD_RADIUS, 0, Math.PI * 2);
            canvasCtx.fill();
            const wingY = Math.sin((bird.wingPhase * Math.PI) / 4) * 4;
            canvasCtx.fillStyle = COLOR_BIRD_WING;
            canvasCtx.beginPath();
            canvasCtx.ellipse(-8, wingY, 8, 6, -0.3, 0, Math.PI * 2);
            canvasCtx.fill();
            canvasCtx.fillStyle = COLOR_BIRD_EYE;
            canvasCtx.beginPath();
            canvasCtx.arc(6, -4, 4, 0, Math.PI * 2);
            canvasCtx.fill();
            canvasCtx.fillStyle = COLOR_BIRD_BEAK;
            canvasCtx.beginPath();
            canvasCtx.moveTo(10, -2);
            canvasCtx.lineTo(18, 0);
            canvasCtx.lineTo(10, 2);
            canvasCtx.closePath();
            canvasCtx.fill();
            canvasCtx.restore();
        }
        
        function drawPipes() {
            pipes.forEach(pipe => {
                canvasCtx.fillStyle = COLOR_PIPE;
                canvasCtx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topY);
                canvasCtx.fillStyle = COLOR_PIPE_HIGHLIGHT;
                canvasCtx.fillRect(pipe.x, 0, 8, pipe.topY);
                canvasCtx.fillStyle = COLOR_PIPE;
                canvasCtx.fillRect(pipe.x - 5, pipe.topY - PIPE_CAP_HEIGHT, PIPE_CAP_WIDTH, PIPE_CAP_HEIGHT);
                canvasCtx.fillStyle = COLOR_PIPE_HIGHLIGHT;
                canvasCtx.fillRect(pipe.x - 5, pipe.topY - PIPE_CAP_HEIGHT, 8, PIPE_CAP_HEIGHT);
                const bottomY = pipe.topY + PIPE_GAP;
                canvasCtx.fillStyle = COLOR_PIPE;
                canvasCtx.fillRect(pipe.x, bottomY, PIPE_WIDTH, CANVAS_HEIGHT - GROUND_HEIGHT - bottomY);
                canvasCtx.fillStyle = COLOR_PIPE_HIGHLIGHT;
                canvasCtx.fillRect(pipe.x, bottomY, 8, CANVAS_HEIGHT - GROUND_HEIGHT - bottomY);
                canvasCtx.fillStyle = COLOR_PIPE;
                canvasCtx.fillRect(pipe.x - 5, bottomY, PIPE_CAP_WIDTH, PIPE_CAP_HEIGHT);
                canvasCtx.fillStyle = COLOR_PIPE_HIGHLIGHT;
                canvasCtx.fillRect(pipe.x - 5, bottomY, 8, PIPE_CAP_HEIGHT);
            });
        }
        
        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / PARTICLE_LIFE;
                canvasCtx.fillStyle = 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',' + (alpha * 0.8) + ')';
                canvasCtx.beginPath();
                canvasCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                canvasCtx.fill();
            });
        }
        
        function drawScore() {
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            canvasCtx.fillRect(CANVAS_WIDTH / 2 - 60, 20, 120, 60);
            canvasCtx.fillStyle = COLOR_TEXT;
            canvasCtx.font = 'bold 48px Arial';
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText(score, CANVAS_WIDTH / 2, 50);
            canvasCtx.font = '16px Arial';
            canvasCtx.textAlign = 'right';
            canvasCtx.fillText('Best: ' + bestScore, CANVAS_WIDTH - 10, 25);
        }
        
        function drawTitle() {
            canvasCtx.fillStyle = COLOR_TEXT;
            canvasCtx.font = 'bold 56px Arial';
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText('FLAPPY BIRD', CANVAS_WIDTH / 2, CANVAS_HEIGHT * 0.4);
            const pulse = (Math.sin((frameCount / BIRD_BOB_PERIOD) * Math.PI * 2) + 1) / 2;
            const alpha = 0.4 + pulse * 0.6;
            canvasCtx.fillStyle = 'rgba(255, 255, 255, ' + alpha + ')';
            canvasCtx.font = '18px Arial';
            canvasCtx.fillText('Press SPACE or tap to start', CANVAS_WIDTH / 2, CANVAS_HEIGHT * 0.52);
        }
        
        function drawGameOver() {
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            canvasCtx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.9)';
            canvasCtx.fillRect(CANVAS_WIDTH / 2 - 120, CANVAS_HEIGHT / 2 - 100, 240, 200);
            canvasCtx.fillStyle = COLOR_TEXT;
            canvasCtx.font = 'bold 40px Arial';
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 60);
            canvasCtx.font = '24px Arial';
            canvasCtx.fillText('Score: ' + score, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
            canvasCtx.fillText('Best: ' + bestScore, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 40);
            if (newBestAchieved) {
                canvasCtx.fillStyle = '#FFD700';
                canvasCtx.font = 'bold 20px Arial';
                canvasCtx.fillText('NEW BEST!', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 80);
            }
            const pulse = (Math.sin((frameCount / BIRD_BOB_PERIOD) * Math.PI * 2) + 1) / 2;
            const alpha = 0.4 + pulse * 0.6;
            canvasCtx.fillStyle = 'rgba(255, 255, 255, ' + alpha + ')';
            canvasCtx.font = '16px Arial';
            canvasCtx.fillText('Press SPACE or tap to restart', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 110);
        }
        
        // PHYSICS
        function updateBirdPhysics() {
            if (gameState === 'menu') {
                bird.y = CANVAS_HEIGHT / 2 + Math.sin((frameCount / BIRD_BOB_PERIOD) * Math.PI * 2) * BIRD_BOB_AMPLITUDE;
                bird.rotation = 0;
            } else if (gameState === 'playing') {
                bird.velocityY += GRAVITY;
                if (bird.velocityY > TERMINAL_VELOCITY) {
                    bird.velocityY = TERMINAL_VELOCITY;
                }
                bird.y += bird.velocityY;
                bird.rotation = Math.max(-30, Math.min(90, (bird.velocityY / TERMINAL_VELOCITY) * 90));
                bird.wingPhase = (bird.wingPhase + 1) % 8;
            } else if (gameState === 'dying' || gameState === 'gameover') {
                bird.velocityY += GRAVITY;
                bird.y += bird.velocityY;
                bird.rotation = Math.min(90, bird.rotation + 3);
            }
        }
        
        function updatePipes() {
            if (gameState === 'playing' && frameCount >= FIRST_PIPE_FRAME && (frameCount - FIRST_PIPE_FRAME) % PIPE_SPAWN_INTERVAL === 0) {
                const minGap = CANVAS_HEIGHT * 0.2;
                const maxGap = CANVAS_HEIGHT * 0.75;
                const gapStart = Math.random() * (maxGap - minGap) + minGap;
                pipes.push({
                    x: CANVAS_WIDTH,
                    topY: gapStart
                });
            }
            pipes.forEach(pipe => {
                pipe.x -= PIPE_SPEED;
            });
            pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);
        }
        
        function updateParticles() {
            particles.forEach(p => {
                p.velocityY += GRAVITY;
                p.x += p.velocityX;
                p.y += p.velocityY;
                p.life--;
            });
            particles = particles.filter(p => p.life > 0);
        }
        
        function checkCollisions() {
            if (gameState !== 'playing') return;
            if (bird.y + BIRD_RADIUS >= CANVAS_HEIGHT - GROUND_HEIGHT) {
                triggerCollision();
                return;
            }
            pipes.forEach(pipe => {
                const margin = COLLISION_MARGIN;
                const birdLeft = bird.x - BIRD_RADIUS + margin;
                const birdRight = bird.x + BIRD_RADIUS - margin;
                const birdTop = bird.y - BIRD_RADIUS + margin;
                const birdBottom = bird.y + BIRD_RADIUS - margin;
                const pipeRight = pipe.x + PIPE_WIDTH;
                const topPipeBottom = pipe.topY + PIPE_CAP_HEIGHT;
                if (birdRight > pipe.x && birdLeft < pipeRight && birdTop < topPipeBottom) {
                    triggerCollision();
                    return;
                }
                const bottomPipeTop = pipe.topY + PIPE_GAP - PIPE_CAP_HEIGHT;
                if (birdRight > pipe.x && birdLeft < pipeRight && birdBottom > bottomPipeTop) {
                    triggerCollision();
                    return;
                }
            });
        }
        
        function triggerCollision() {
            gameState = 'dying';
            initAudioContext();
            playHitSound();
            setTimeout(() => {
                playDieSound();
            }, 100);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                const r = Math.floor(Math.random() * 100 + 155);
                const g = Math.floor(Math.random() * 100 + 100);
                const b = Math.floor(Math.random() * 50);
                particles.push({
                    x: bird.x,
                    y: bird.y,
                    velocityX: Math.cos(angle) * speed,
                    velocityY: Math.sin(angle) * speed,
                    radius: Math.random() * 3 + 3,
                    life: PARTICLE_LIFE,
                    r: r,
                    g: g,
                    b: b
                });
            }
        }
        
        function checkScoring() {
            pipes.forEach((pipe, idx) => {
                if (idx !== lastScoredPipeIndex && bird.x > pipe.x + PIPE_WIDTH) {
                    score++;
                    lastScoredPipeIndex = idx;
                    initAudioContext();
                    playPointSound();
                }
            });
        }
        
        // INPUT
        function flap() {
            initAudioContext();
            playFlapSound();
            bird.velocityY = FLAP_VELOCITY;
        }
        
        function handleInput() {
            if (gameState === 'menu') {
                gameState = 'playing';
                resetGame();
            } else if (gameState === 'playing') {
                flap();
            } else if (gameState === 'gameover') {
                gameState = 'playing';
                resetGame();
            }
        }
        
        function resetGame() {
            bird = {
                x: BIRD_X,
                y: CANVAS_HEIGHT / 2,
                velocityY: 0,
                rotation: 0,
                wingPhase: 0
            };
            pipes = [];
            particles = [];
            score = 0;
            lastScoredPipeIndex = -1;
            newBestAchieved = false;
            frameCount = 0;
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });
        
        gameCanvas.addEventListener('touchstart', e => {
            e.preventDefault();
            handleInput();
        }, { passive: false });
        
        gameCanvas.addEventListener('click', () => {
            handleInput();
        });
        
        window.addEventListener('resize', updateCanvasScale);
        
        // CANVAS SCALING
        function updateCanvasScale() {
            const scale = Math.min(window.innerWidth / CANVAS_WIDTH, window.innerHeight / CANVAS_HEIGHT);
            gameCanvas.style.transform = 'scale(' + scale + ')';
        }
        
        // GAME LOOP
        function gameLoop() {
            drawSky();
            drawClouds();
            drawGround();
            updateBirdPhysics();
            updatePipes();
            updateParticles();
            checkCollisions();
            checkScoring();
            if (gameState === 'dying' && particles.length === 0 && bird.y >= CANVAS_HEIGHT - GROUND_HEIGHT) {
                gameState = 'gameover';
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('flappyBirdBest', bestScore);
                    newBestAchieved = true;
                }
            }
            drawPipes();
            drawBird();
            drawParticles();
            drawScore();
            if (gameState === 'menu') {
                drawTitle();
            } else if (gameState === 'gameover') {
                drawGameOver();
            }
            frameCount++;
            requestAnimationFrame(gameLoop);
        }
        
        updateCanvasScale();
        gameLoop();
    </script>
</body>
</html>
